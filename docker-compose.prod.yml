version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scrap_metal_db}
      POSTGRES_USER: ${POSTGRES_USER:-scrap_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  backend:
    build: ./backend
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-scrap_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-scrap_metal_db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      UPLOAD_FOLDER: uploads
      PROCESSED_FOLDER: processed
      MODEL_PATH: best.pt
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.5}
    volumes:
      - uploads_data:/app/uploads
      - processed_data:/app/processed
      # Uncomment the line below once you have a trained best.pt model:
      # - ./backend/best.pt:/app/best.pt:ro
    networks:
      - internal
      - web

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - web

networks:
  internal:
    driver: bridge
  web:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  processed_data:
